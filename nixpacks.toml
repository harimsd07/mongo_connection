[phases.setup]
nixPkgs = [
    "php84",
    "php84Extensions.mongodb",
    "php84Extensions.mbstring",
    "php84Extensions.xml",
    "php84Extensions.curl",
    "php84Extensions.zip",
    "php84Extensions.pdo",
    "php84Extensions.tokenizer",
    "php84Extensions.bcmath",
    "nodejs_20"
]

[phases.install]
cmds = [
    "curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer",
    "php /usr/local/bin/composer install --optimize-autoloader --no-dev --no-interaction --ignore-platform-req=ext-mongodb",
    "npm install"
]

[phases.build]
cmds = [
    "npm run build"
]

[start]
cmd = "php -d extension=mongodb.so artisan config:clear && php -d extension=mongodb.so artisan serve --host=0.0.0.0 --port=$PORT"
